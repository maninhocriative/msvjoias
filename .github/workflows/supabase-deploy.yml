name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase production
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ahbjwpkpxqqrpvpzmqwa
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend build
        run: npm run build

      - name: Link Supabase project
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        run: npx supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy Edge Functions
        run: npx supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF" --use-api --jobs 4
